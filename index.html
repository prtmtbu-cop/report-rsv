<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSV Finder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#0f172a;
  color:white;
}
.card {
  background:#1e293b;
  border:none;
}
input {
  background:#020617;
  color:white;
}
</style>

</head>

<body class="p-4">

<h2>🔍 RSV Finder Dashboard</h2>

<div class="row my-3">
  <div class="col-md-4">
    <input type="text" id="search" class="form-control" placeholder="Masukkan RSV...">
  </div>
  <div class="col-md-2">
    <button onclick="searchData()" class="btn btn-primary">Search</button>
  </div>
</div>

<div class="card p-3">
  <table class="table table-dark table-striped" id="table">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwm5ZtBtyCyUKeagTAPe1J0I5OLK64RQgakqzRxPID-JlXtcRTnDTilzOzET1LdV6HihCjnAH0NA9n/pub?gid=295925406&single=true&output=csv";

let allData = [];

async function loadData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  allData = rows;

  renderTable(rows);
}

function searchData(){
  const keyword = document.getElementById("search").value.toLowerCase();

  const header = allData[0];
  const data = allData.slice(1);

  const filtered = data.filter(row => 
    row[1] && row[1].toLowerCase().includes(keyword)
  );

  renderTable([header, ...filtered]);
}

function renderTable(data){
  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  // header
  let head = "<tr>";
  data[0].forEach(h => head += `<th>${h}</th>`);
  head += "</tr>";
  thead.innerHTML = head;

  // body
  data.slice(1).forEach(row => {
    let tr = "<tr>";
    row.forEach(col => tr += `<td>${col}</td>`);
    tr += "</tr>";
    tbody.innerHTML += tr;
  });
}

loadData();

</script>

</body>
</html>
