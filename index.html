<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSV Finder Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  font-family: 'Segoe UI', sans-serif;
}

h2 {
  font-weight: 700;
}

.glass {
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 20px;
}

input {
  background: #020617 !important;
  color: white !important;
  border: 1px solid #334155 !important;
}

.table-container {
  max-height: 500px;
  overflow: auto;
}

table {
  font-size: 12px;
}

thead th {
  position: sticky;
  top: 0;
  background: #1e293b;
}

.highlight {
  background-color: #22c55e !important;
  color: black;
  font-weight: bold;
}

.card-stat {
  text-align: center;
  padding: 15px;
  border-radius: 12px;
  background: linear-gradient(145deg, #1e293b, #0f172a);
}

</style>
</head>

<body class="p-4">

<h2>🚀 RSV Finder Dashboard</h2>

<div class="row my-3">
  <div class="col-md-4">
    <input type="text" id="search" class="form-control" placeholder="🔍 Ketik RSV..." onkeyup="searchData()">
  </div>
</div>

<div class="row mb-3" id="stats"></div>

<div class="glass table-container">
  <table class="table table-dark table-hover" id="table">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>

const SHEET_URL = "PASTE_LINK_CSV_DISINI";

let allData = [];

async function loadData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  allData = rows;

  renderTable(rows);
  renderStats(rows.length - 1);
}

function searchData(){
  const keyword = document.getElementById("search").value.toLowerCase();

  const header = allData[0];
  const data = allData.slice(1);

  const filtered = data.filter(row => 
    row[1] && row[1].toLowerCase().includes(keyword)
  );

  renderTable([header, ...filtered], keyword);
  renderStats(filtered.length);
}

function renderTable(data, keyword=""){
  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  // HEADER
  let head = "<tr>";
  data[0].forEach(h => head += `<th>${h}</th>`);
  head += "</tr>";
  thead.innerHTML = head;

  // BODY
  data.slice(1).forEach(row => {
    let tr = "<tr>";

    row.forEach((col, i) => {
      let cell = col;

      // highlight kolom RSV
      if(keyword && i === 1 && col.toLowerCase().includes(keyword)){
        cell = `<span class="highlight">${col}</span>`;
      }

      tr += `<td>${cell}</td>`;
    });

    tr += "</tr>";
    tbody.innerHTML += tr;
  });
}

function renderStats(total){
  document.getElementById("stats").innerHTML = `
    <div class="col-md-3">
      <div class="card-stat">
        <h6>Total Data</h6>
        <h3>${total}</h3>
      </div>
    </div>
  `;
}

loadData();

</script>

</body>
</html>
