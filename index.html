<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSV Finder Ultimate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

h2 {
  font-weight: bold;
}

.search-box {
  max-width: 400px;
}

.card-item {
  background: rgba(30,41,59,0.7);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  border: 1px solid #1e293b;
  transition: 0.3s;
}

.card-item:hover {
  transform: translateY(-5px);
  border-color: #38bdf8;
}

.label {
  font-size: 11px;
  color: #94a3b8;
}

.value {
  font-weight: bold;
  margin-bottom: 10px;
}

.notfound {
  text-align: center;
  margin-top: 50px;
  color: #f87171;
}
</style>

</head>

<body class="p-4">

<h2>🚀 RSV Finder Ultimate</h2>

<div class="search-box my-3">
  <input type="text" id="search" class="form-control" placeholder="🔍 Cari RSV..." oninput="searchData()">
</div>

<div class="row" id="grid"></div>

<script>

// 🔥 CONFIG
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Yq2gA1cPvy2Aj7EhYhVkdsYDjjLHc-Uy5zsWnqCfL4Q/export?format=csv&gid=295925406";

let headers = [];
let allData = [];

// 🔥 CSV PARSER AMAN (ANTI KOMA ERROR)
function parseCSV(text) {
  const rows = text.split("\n").map(row =>
    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
  );
  return rows.map(r => r.map(c => c.replace(/"/g, "").trim()));
}

// 🔥 LOAD DATA
async function loadData(){
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = parseCSV(text);

    headers = rows[0];
    allData = rows.slice(1);

    console.log("DATA LOADED:", allData.length);

    renderGrid(allData);

  } catch(err) {
    console.error("ERROR LOAD:", err);
    document.getElementById("grid").innerHTML = 
      `<h4 class="notfound">❌ Gagal load data</h4>`;
  }
}

// 🔍 SEARCH RSV (KOLOM B)
function searchData(){
  const keyword = document.getElementById("search").value.toLowerCase().trim();

  if(!keyword){
    renderGrid(allData);
    return;
  }

  const filtered = allData.filter(row => {
    const rsv = (row[1] || "").toLowerCase().trim();
    return rsv.includes(keyword);
  });

  console.log("SEARCH:", keyword, "HASIL:", filtered.length);

  renderGrid(filtered);
}

// 🎯 RENDER GRID
function renderGrid(data){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if(data.length === 0){
    grid.innerHTML = `<h4 class="notfound">❌ Data tidak ditemukan</h4>`;
    return;
  }

  data.forEach(row => {

    grid.innerHTML += `
      <div class="col-md-4">
        <div class="card-item">

          <div class="label">RSV</div>
          <div class="value">${row[1] || "-"}</div>

          <div class="label">Req By</div>
          <div class="value">${row[0] || "-"}</div>

          <div class="label">Req Date</div>
          <div class="value">${row[2] || "-"}</div>

          <div class="label">Status</div>
          <div class="value">${row[11] || "-"}</div>

          <div class="label">Total Item</div>
          <div class="value">${row[12] || "-"}</div>

        </div>
      </div>
    `;
  });
}

// 🚀 INIT
loadData();

</script>

</body>
</html>
