<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSV Finder Grid</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #020617;
  color: white;
}

.card-item {
  background: #0f172a;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  border: 1px solid #1e293b;
  transition: 0.3s;
}

.card-item:hover {
  transform: scale(1.02);
  border-color: #38bdf8;
}

.label {
  font-size: 11px;
  color: #94a3b8;
}

.value {
  font-weight: bold;
  margin-bottom: 8px;
}

.search-box {
  max-width: 400px;
}

</style>

</head>

<body class="p-4">

<h3>🚀 RSV Finder (Grid View)</h3>

<div class="search-box my-3">
  <input type="text" id="search" class="form-control" placeholder="🔍 Cari RSV..." onkeyup="searchData()">
</div>

<div class="row" id="grid"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Yq2gA1cPvy2Aj7EhYhVkdsYDjjLHc-Uy5zsWnqCfL4Q/export?format=csv&gid=295925406";

let headers = [];
let allData = [];

async function loadData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));

  headers = rows[0];
  allData = rows.slice(1);

  renderGrid(allData);
}

function searchData(){
  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(row =>
    row[1] && row[1].toLowerCase().includes(keyword)
  );

  renderGrid(filtered);
}

function renderGrid(data){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(row => {

    grid.innerHTML += `
      <div class="col-md-4">
        <div class="card-item">
          <div class="label">RSV</div>
          <div class="value">${row[1]}</div>

          <div class="label">Req By</div>
          <div class="value">${row[0]}</div>

          <div class="label">Req Date</div>
          <div class="value">${row[2]}</div>

          <div class="label">Status</div>
          <div class="value">${row[11]}</div>

          <div class="label">Total Item</div>
          <div class="value">${row[12]}</div>

          <button class="btn btn-sm btn-info mt-2" onclick='showDetail(${JSON.stringify(row)})'>
            Detail
          </button>
        </div>
      </div>
    `;
  });
}

function showDetail(row){
  let detail = "";

  headers.forEach((h,i)=>{
    detail += `${h} : ${row[i]}\n`;
  });

  alert(detail);
}

loadData();

</script>

</body>
</html>
