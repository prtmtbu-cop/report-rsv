<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSV Finder Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #020617;
  color: #e2e8f0;
}

.card {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 12px;
}

input {
  background: #020617 !important;
  color: white !important;
}

.table-hover tbody tr:hover {
  background: #1e293b;
  cursor: pointer;
}

.modal-content {
  background: #0f172a;
  color: white;
}

.label {
  font-size: 12px;
  color: #94a3b8;
}

.value {
  font-weight: bold;
}

</style>
</head>

<body class="p-4">

<h3>🚀 RSV Finder (Professional View)</h3>

<div class="row my-3">
  <div class="col-md-4">
    <input type="text" id="search" class="form-control" placeholder="🔍 Cari RSV..." onkeyup="searchData()">
  </div>
</div>

<div class="card p-3">
  <table class="table table-dark table-hover" id="table">
    <thead>
      <tr>
        <th>Req By</th>
        <th>RSV</th>
        <th>Req Date</th>
        <th>Status</th>
        <th>Total Item</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MODAL DETAIL -->
<div class="modal fade" id="detailModal">
  <div class="modal-dialog modal-xl">
    <div class="modal-content p-3">
      <h5>Detail Data</h5>
      <div class="row" id="detailContent"></div>
    </div>
  </div>
</div>

<script>

const SHEET_URL = "PASTE_LINK_CSV_DISINI";

let headers = [];
let allData = [];

async function loadData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));

  headers = rows[0];
  allData = rows.slice(1);

  renderTable(allData);
}

function searchData(){
  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(row =>
    row[1] && row[1].toLowerCase().includes(keyword)
  );

  renderTable(filtered);
}

function renderTable(data){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(row => {

    let tr = `<tr onclick='showDetail(${JSON.stringify(row)})'>
      <td>${row[0]}</td>
      <td><b>${row[1]}</b></td>
      <td>${row[2]}</td>
      <td>${row[11]}</td>
      <td>${row[12]}</td>
    </tr>`;

    tbody.innerHTML += tr;
  });
}

function showDetail(row){
  const container = document.getElementById("detailContent");
  container.innerHTML = "";

  headers.forEach((h, i) => {
    container.innerHTML += `
      <div class="col-md-3 mb-3">
        <div class="card p-2">
          <div class="label">${h}</div>
          <div class="value">${row[i]}</div>
        </div>
      </div>
    `;
  });

  new bootstrap.Modal(document.getElementById('detailModal')).show();
}

loadData();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
